    <main><section class="section"><div class="container"><div class="section-head"><div><span class="eyebrow">技術担当に相談</span><h1 style="color:var(--ink);font-size:48px;">ご注文前に最適な産業用製品を確認。</h1></div><p>マシンビジョン、センサー、RFID、スキャナー、連携に関するご質問は、環境とワークフローの詳細をお送りください。</p></div><form class="form" data-demo-form><div class="form-grid"><div class="field"><label>製品SKU</label><input name="sku" data-prefill-sku placeholder="任意"></div><div class="field"><label>用途分野</label><select name="application"><option>マシンビジョン検査</option><option>倉庫 / RFID</option><option>バーコードスキャン</option><option>産業用センシング</option><option>ロボット / 自動化セル</option><option>その他</option></select></div><div class="field"><label>勤務先メール</label><input required type="email" name="email"></div><div class="field"><label>会社名</label><input name="company"></div><div class="field field-wide"><label>技術的なご質問</label><textarea required name="question" placeholder="部品サイズ、速度、距離、コード種別、照明、インターフェース、環境、既存設備など。"></textarea></div></div><button class="button button-primary" type="submit">エンジニアに送信</button></form></div></section></main>
